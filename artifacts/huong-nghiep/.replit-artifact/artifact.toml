kind = "web"
previewPath = "/"
title = "Hướng Nghiệp Thông Minh"
version = "1.0.0"
id = "artifacts/huong-nghiep"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20561

[services.development]
run = "pnpm --filter @workspace/huong-nghiep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/huong-nghiep", "run", "build" ]
publicDir = "artifacts/huong-nghiep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20561"
BASE_PATH = "/"
